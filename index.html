<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyRecoverySteps</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Segoe UI', Roboto, sans-serif;
      background:
        radial-gradient(ellipse 90% 70% at 5% 35%, rgba(116, 172, 223, 0.65) 0%, transparent 55%),
        radial-gradient(ellipse 60% 80% at 92% 8%,  rgba(74, 144, 226, 0.45) 0%, transparent 50%),
        radial-gradient(ellipse 75% 55% at 55% 95%, rgba(14, 42, 90, 0.95)   0%, transparent 65%),
        linear-gradient(155deg, #0d1f3c 0%, #163d7a 35%, #2563ab 65%, #5a9fd4 100%);
      min-height: 100vh;
      padding: clamp(16px, 5vw, 44px) clamp(12px, 4vw, 32px);
    }

    #root { max-width: 1040px; margin: 0 auto; }

    /* ── Liquid Glass layers ── */
    .glass-shell {
      background: rgba(255, 255, 255, 0.11);
      backdrop-filter: blur(48px) saturate(190%) brightness(1.06);
      -webkit-backdrop-filter: blur(48px) saturate(190%) brightness(1.06);
      border: 1px solid rgba(255, 255, 255, 0.26);
      border-radius: 32px;
      box-shadow:
        0 16px 56px rgba(0, 0, 0, 0.22),
        0 3px 8px  rgba(0, 0, 0, 0.10),
        inset 0 2px 0   rgba(255, 255, 255, 0.50),
        inset 0 -1px 0  rgba(0, 0, 0, 0.06);
    }

    .glass-panel {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(28px) saturate(160%);
      -webkit-backdrop-filter: blur(28px) saturate(160%);
      border: 1px solid rgba(255, 255, 255, 0.20);
      border-radius: 20px;
      box-shadow:
        0 4px 20px rgba(0, 0, 0, 0.10),
        inset 0 1.5px 0 rgba(255, 255, 255, 0.38);
    }

    .glass-blue {
      background: rgba(116, 172, 223, 0.17);
      backdrop-filter: blur(24px) saturate(155%);
      -webkit-backdrop-filter: blur(24px) saturate(155%);
      border: 1px solid rgba(116, 172, 223, 0.34);
      border-radius: 20px;
      box-shadow:
        0 4px 20px rgba(28, 63, 117, 0.14),
        inset 0 1.5px 0 rgba(255, 255, 255, 0.30);
    }

    .glass-gold {
      background: rgba(203, 161, 53, 0.16);
      backdrop-filter: blur(24px) saturate(155%);
      -webkit-backdrop-filter: blur(24px) saturate(155%);
      border: 1px solid rgba(203, 161, 53, 0.36);
      border-radius: 20px;
      box-shadow:
        0 4px 20px rgba(203, 161, 53, 0.14),
        0 0 28px  rgba(203, 161, 53, 0.08),
        inset 0 1.5px 0 rgba(255, 255, 255, 0.30);
    }

    .glass-dim {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.10);
      border-radius: 16px;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.12);
    }

    /* ── Chart bar ── */
    .bar {
      background: linear-gradient(to top,
        rgba(74, 144, 226, 0.55) 0%,
        rgba(160, 210, 250, 0.90) 100%);
      border: 1px solid rgba(255, 255, 255, 0.30);
      border-radius: 5px 5px 3px 3px;
      box-shadow:
        0 2px 10px rgba(116, 172, 223, 0.45),
        inset 0 1px 0  rgba(255, 255, 255, 0.55);
    }

    /* ── Responsive grids ── */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: clamp(10px, 2vw, 16px);
    }
    @media (max-width: 500px) {
      .stat-grid {
        grid-template-columns: 1fr 1fr;
      }
      .stat-grid > *:last-child {
        grid-column: 1 / -1;
      }
    }

    .badge-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: clamp(8px, 2vw, 12px);
    }
    @media (max-width: 620px) { .badge-grid { grid-template-columns: repeat(2, 1fr); } }

    /* ── Scrollable chart ── */
    .chart-scroll {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      padding-bottom: 2px;
    }
    .chart-scroll::-webkit-scrollbar { display: none; }

    /* ── BETA pill ── */
    .beta-pill {
      display: inline-block;
      margin-left: 10px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.8px;
      background: rgba(116, 172, 223, 0.28);
      border: 1px solid rgba(116, 172, 223, 0.45);
      border-radius: 6px;
      padding: 2px 7px;
      color: rgba(190, 225, 255, 0.92);
      vertical-align: middle;
      position: relative;
      top: -2px;
    }

    /* ── Badge glow ── */
    .badge-glow {
      box-shadow:
        0 6px 24px rgba(203, 161, 53, 0.22),
        inset 0 1.5px 0 rgba(255, 255, 255, 0.35);
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const W  = (a) => `rgba(255,255,255,${a})`;
    const GOLD = '#CBA135';
    const GOLD_LIGHT = '#F2D882';
    const BLUE_LIGHT = 'rgba(185, 222, 255, 0.95)';
    const BLUE_MID   = 'rgba(116, 172, 223, 0.80)';

    const StatCard = ({ label, value, unit, variant }) => {
      const isGold = variant === 'gold';
      return (
        <div
          className={isGold ? 'glass-gold' : 'glass-blue'}
          style={{ padding: 'clamp(14px, 3vw, 22px)', textAlign: 'center', borderRadius: '18px' }}
        >
          <div style={{ fontSize: 'clamp(10px, 2vw, 12px)', color: W(0.58), fontWeight: 400, letterSpacing: '0.3px', marginBottom: '8px', textTransform: 'uppercase' }}>
            {label}
          </div>
          <div style={{ fontSize: 'clamp(30px, 6vw, 40px)', fontWeight: 200, color: isGold ? GOLD_LIGHT : BLUE_LIGHT, letterSpacing: '-1.5px', lineHeight: 1, marginBottom: '6px' }}>
            {value}
          </div>
          <div style={{ fontSize: 'clamp(10px, 1.8vw, 12px)', color: isGold ? 'rgba(203,161,53,0.75)' : BLUE_MID, fontWeight: 400 }}>
            {unit}
          </div>
        </div>
      );
    };

    const WalkTracker = () => {
      const realData = {
        currentStreak: 1,
        totalDistance: 12.4,
        lastActivity: {
          date: '2026-06-27',
          distance: 0.93,
          duration: 1900,
          pace: 33.8
        },
        dailyData: [
          { date: 'Jun 3',  distance: 0.33 },
          { date: 'Jun 4',  distance: 0.33 },
          { date: 'Jun 5',  distance: 0.30 },
          { date: 'Jun 7',  distance: 0.36 },
          { date: 'Jun 8',  distance: 1.02 },
          { date: 'Jun 9',  distance: 0.33 },
          { date: 'Jun 10', distance: 0.36 },
          { date: 'Jun 11', distance: 0.69 },
          { date: 'Jun 13', distance: 0.81 },
          { date: 'Jun 15', distance: 0.59 },
          { date: 'Jun 16', distance: 0.61 },
          { date: 'Jun 17', distance: 0.39 },
          { date: 'Jun 18', distance: 0.59 },
          { date: 'Jun 23', distance: 0.62 },
          { date: 'Jun 24', distance: 0.55 },
          { date: 'Jun 25', distance: 1.00 },
          { date: 'Jun 27', distance: 0.93 }
        ],
        badges: [
          { id: 1, name: 'First Steps',    description: 'Complete your first walk',       unlocked: true,  icon: '👣' },
          { id: 2, name: '5-Day Warrior',  description: '5 consecutive days walked',      unlocked: true,  icon: '⚔️' },
          { id: 3, name: '10-Day Legend',  description: '10 consecutive days walked',     unlocked: false, icon: '👑' },
          { id: 4, name: 'Marathon Master',description: 'Single walk of 26.2 miles',      unlocked: false, icon: '🏃' },
          { id: 5, name: '100 Mile Club',  description: 'Walk 100+ miles',                unlocked: false, icon: '💯' },
          { id: 6, name: '14-Day Streak',  description: '14 consecutive days walked',     unlocked: false, icon: '🔥' },
          { id: 7, name: 'Twice Daily',    description: '2 walks in one day',             unlocked: true,  icon: '⭐' }
        ]
      };

      const [data] = React.useState(realData);
      const unlockedCount = data.badges.filter(b => b.unlocked).length;
      const maxDistance   = Math.max(...data.dailyData.map(d => d.distance));
      const pct           = (data.totalDistance / 100) * 100;

      return (
        <div className="glass-shell" style={{ padding: 'clamp(20px, 4vw, 40px)' }}>

          {/* ── Header ── */}
          <div style={{ marginBottom: 'clamp(20px, 4vw, 36px)' }}>
            <h1 style={{ fontSize: 'clamp(22px, 5vw, 32px)', fontWeight: 600, color: W(0.96), letterSpacing: '-0.6px', marginBottom: '8px' }}>
              My Recovery Steps
              <span className="beta-pill">BETA</span>
            </h1>
            <p style={{ fontSize: 'clamp(12px, 2.5vw, 14px)', color: W(0.50), fontWeight: 300, lineHeight: 1.55 }}>
              Tracking daily walking progress · Powered by Strava MCP
            </p>
          </div>

          {/* ── Stats ── */}
          <div className="stat-grid" style={{ marginBottom: 'clamp(14px, 3vw, 22px)' }}>
            <StatCard label="Current Streak"  value={data.currentStreak}                   unit="days in a row"   variant="blue" />
            <StatCard label="Total Distance"  value={data.totalDistance.toFixed(1)}         unit="miles since Jun 1" variant="blue" />
            <StatCard label="To 100 Miles"    value={(100 - data.totalDistance).toFixed(1)} unit="miles away"      variant="gold" />
          </div>

          {/* ── Progress bar ── */}
          <div className="glass-panel" style={{ padding: 'clamp(14px, 3vw, 20px)', marginBottom: 'clamp(14px, 3vw, 22px)', borderRadius: '18px' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: '10px' }}>
              <span style={{ fontSize: 'clamp(11px, 2vw, 13px)', color: W(0.70), fontWeight: 400, textTransform: 'uppercase', letterSpacing: '0.3px' }}>100-Mile Goal</span>
              <span style={{ fontSize: 'clamp(11px, 2vw, 13px)', color: GOLD_LIGHT, fontWeight: 500 }}>{pct.toFixed(1)}%</span>
            </div>
            <div style={{ height: '8px', borderRadius: '100px', background: 'rgba(255,255,255,0.10)', overflow: 'hidden', border: '1px solid rgba(255,255,255,0.12)' }}>
              <div style={{
                height: '100%',
                width: `${pct}%`,
                borderRadius: '100px',
                background: `linear-gradient(90deg, rgba(116,172,223,0.8) 0%, rgba(203,161,53,0.9) 100%)`,
                boxShadow: '0 0 12px rgba(203,161,53,0.4)',
                transition: 'width 0.6s ease'
              }} />
            </div>
          </div>

          {/* ── Chart ── */}
          <div className="glass-panel" style={{ padding: 'clamp(14px, 3vw, 20px)', marginBottom: 'clamp(14px, 3vw, 22px)', borderRadius: '18px' }}>
            <h2 style={{ fontSize: 'clamp(12px, 2.5vw, 15px)', fontWeight: 500, color: W(0.80), marginBottom: '16px', textTransform: 'uppercase', letterSpacing: '0.4px' }}>
              Daily Distance Trend
            </h2>
            <div className="chart-scroll">
              <div style={{ display: 'flex', alignItems: 'flex-end', gap: '6px', height: '160px', minWidth: 'min-content' }}>
                {data.dailyData.map((day, idx) => (
                  <div key={idx} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', flex: '0 0 auto', minWidth: '34px' }}>
                    <div style={{ fontSize: '8px', color: W(0.70), fontWeight: 600, marginBottom: '3px', height: '12px', textAlign: 'center' }}>
                      {day.distance}
                    </div>
                    <div
                      className="bar"
                      style={{ width: '18px', height: `${(day.distance / maxDistance) * 120}px`, minHeight: '6px' }}
                    />
                    <div style={{ fontSize: '8px', color: W(0.45), marginTop: '5px', fontWeight: 400, textAlign: 'center' }}>
                      {day.date.split(' ')[1]}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>

          {/* ── Badges ── */}
          <div style={{ marginBottom: 'clamp(14px, 3vw, 22px)' }}>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 'clamp(12px, 2vw, 16px)' }}>
              <h2 style={{ fontSize: 'clamp(12px, 2.5vw, 15px)', fontWeight: 500, color: W(0.80), textTransform: 'uppercase', letterSpacing: '0.4px' }}>
                Badges Earned
              </h2>
              <span style={{
                fontSize: '12px', fontWeight: 500, color: GOLD,
                background: 'rgba(203,161,53,0.15)',
                border: '1px solid rgba(203,161,53,0.32)',
                borderRadius: '20px', padding: '3px 11px'
              }}>
                {unlockedCount} / {data.badges.length}
              </span>
            </div>
            <div className="badge-grid">
              {data.badges.map(badge => (
                <div
                  key={badge.id}
                  className={badge.unlocked ? 'glass-gold badge-glow' : 'glass-dim'}
                  style={{
                    padding: 'clamp(10px, 2.5vw, 16px)',
                    borderRadius: '16px',
                    textAlign: 'center',
                    opacity: badge.unlocked ? 1 : 0.40,
                  }}
                >
                  <div style={{ fontSize: 'clamp(22px, 4vw, 30px)', marginBottom: '6px', lineHeight: 1 }}>{badge.icon}</div>
                  <div style={{ fontSize: 'clamp(10px, 1.8vw, 12px)', fontWeight: 600, color: badge.unlocked ? GOLD_LIGHT : W(0.55), marginBottom: '4px', lineHeight: 1.2 }}>
                    {badge.name}
                  </div>
                  <div style={{ fontSize: '10px', color: W(0.42), lineHeight: 1.35 }}>{badge.description}</div>
                  {badge.unlocked && (
                    <div style={{ marginTop: '7px', fontSize: '10px', color: GOLD, fontWeight: 600, letterSpacing: '0.3px' }}>✓ Unlocked</div>
                  )}
                </div>
              ))}
            </div>
          </div>

          {/* ── Insights ── */}
          <div className="glass-blue" style={{ padding: 'clamp(14px, 3vw, 22px)', borderRadius: '20px' }}>
            <h3 style={{ fontSize: 'clamp(12px, 2.5vw, 14px)', fontWeight: 500, color: W(0.80), marginBottom: '10px', textTransform: 'uppercase', letterSpacing: '0.4px' }}>
              Walking Insights
            </h3>
            <p style={{ fontSize: 'clamp(12px, 2vw, 14px)', color: W(0.62), lineHeight: 1.75, fontWeight: 300 }}>
              Great work on your walking routine! You've completed 17 walks totaling 12.4 miles since June 1st. Your longest streak was 5 consecutive days (Jun 7–11), and you've already unlocked 3 badges including the "Twice Daily" achievement. Keep building consistency to work toward your 14-day streak and 100-mile milestone!
            </p>
          </div>

        </div>
      );
    };

    ReactDOM.render(<WalkTracker />, document.getElementById('root'));
  </script>
</body>
</html>
