<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyRecoverySteps</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #74ACDF 0%, #1C3F75 100%);
      min-height: 100vh;
      padding: 20px;
    }
    #root {
      max-width: 1000px;
      margin: 0 auto;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <script type="text/babel">
    const { useState } = React;

    const WalkTracker = () => {
      const realData = {
        currentStreak: 1,
        totalDistance: 12.4,
        lastActivity: {
          date: '2026-06-27',
          distance: 0.93,
          duration: 1900,
          pace: 33.8
        },
        dailyData: [
          { date: 'Jun 3', distance: 0.33 },
          { date: 'Jun 4', distance: 0.33 },
          { date: 'Jun 5', distance: 0.30 },
          { date: 'Jun 7', distance: 0.36 },
          { date: 'Jun 8', distance: 1.02 },
          { date: 'Jun 9', distance: 0.33 },
          { date: 'Jun 10', distance: 0.36 },
          { date: 'Jun 11', distance: 0.69 },
          { date: 'Jun 13', distance: 0.81 },
          { date: 'Jun 15', distance: 0.59 },
          { date: 'Jun 16', distance: 0.61 },
          { date: 'Jun 17', distance: 0.39 },
          { date: 'Jun 18', distance: 0.59 },
          { date: 'Jun 23', distance: 0.62 },
          { date: 'Jun 24', distance: 0.55 },
          { date: 'Jun 25', distance: 1.00 },
          { date: 'Jun 27', distance: 0.93 }
        ],
        badges: [
          { id: 1, name: 'First Steps', description: 'Complete your first walk', unlocked: true, icon: '👣' },
          { id: 2, name: '5-Day Warrior', description: '5 consecutive days walked', unlocked: true, icon: '⚔️' },
          { id: 3, name: '10-Day Legend', description: '10 consecutive days walked', unlocked: false, icon: '👑' },
          { id: 4, name: 'Marathon Master', description: 'Single walk of 26.2 miles', unlocked: false, icon: '🏃' },
          { id: 5, name: '100 Mile Club', description: 'Walk 100+ miles', unlocked: false, icon: '💯' },
          { id: 6, name: '14-Day Streak', description: '14 consecutive days walked', unlocked: false, icon: '🔥' },
          { id: 7, name: 'Twice Daily', description: '2 walks in one day', unlocked: true, icon: '⭐' }
        ]
      };

      // Auto-load data on component mount
      const [data] = React.useState(realData);

      const unlockedCount = data.badges.filter(b => b.unlocked).length;
      const maxDistance = Math.max(...data.dailyData.map(d => d.distance));

      return (
        <div style={{ padding: 'clamp(1rem, 5vw, 2rem)', background: '#FFFFFF', borderRadius: '12px', marginTop: '2rem' }}>
          <h1 style={{ fontSize: 'clamp(22px, 6vw, 28px)', fontWeight: 500, color: '#1C3F75', marginBottom: '0.5rem' }}>My Recovery Steps BETA</h1>
          <p style={{ fontSize: '14px', color: '#1C3F75', fontStyle: 'italic', marginBottom: '2rem', lineHeight: 1.5 }}>Tracking my daily walking progress using the Strava MCP as a test use case.</p>
          
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(160px, 1fr))', gap: '16px', marginBottom: '2rem' }}>
            <div style={{ background: '#F0F7FF', padding: '1.5rem', borderRadius: '12px', border: '2px solid #74ACDF', textAlign: 'center' }}>
              <div style={{ fontSize: '13px', color: '#1C3F75', marginBottom: '8px', fontWeight: 500 }}>Current Streak</div>
              <div style={{ fontSize: '32px', fontWeight: 500, color: '#1C3F75', marginBottom: '4px' }}>{data.currentStreak}</div>
              <div style={{ fontSize: '12px', color: '#74ACDF' }}>days in a row</div>
            </div>

            <div style={{ background: '#F0F7FF', padding: '1.5rem', borderRadius: '12px', border: '2px solid #74ACDF', textAlign: 'center' }}>
              <div style={{ fontSize: '13px', color: '#1C3F75', marginBottom: '8px', fontWeight: 500 }}>Total Distance</div>
              <div style={{ fontSize: '32px', fontWeight: 500, color: '#1C3F75', marginBottom: '4px' }}>{data.totalDistance.toFixed(1)}</div>
              <div style={{ fontSize: '12px', color: '#74ACDF' }}>miles since Jun 1</div>
            </div>

            <div style={{ background: '#FFF8F0', padding: '1.5rem', borderRadius: '12px', border: '2px solid #CBA135', textAlign: 'center' }}>
              <div style={{ fontSize: '13px', color: '#1C3F75', marginBottom: '8px', fontWeight: 500 }}>To 100 Miles</div>
              <div style={{ fontSize: '28px', fontWeight: 500, color: '#CBA135', marginBottom: '4px' }}>{(100 - data.totalDistance).toFixed(1)}</div>
              <div style={{ fontSize: '12px', color: '#CBA135' }}>miles away</div>
            </div>
          </div>

          <div style={{ background: '#F0F7FF', padding: '1rem', borderRadius: '12px', border: '1px solid #74ACDF', marginBottom: '2rem', overflowX: 'auto' }}>
            <h2 style={{ fontSize: '16px', fontWeight: 500, color: '#1C3F75', marginBottom: '1rem' }}>Daily Distance Trend</h2>
            <div style={{ 
              display: 'flex', 
              alignItems: 'flex-end', 
              gap: '3px', 
              height: '180px',
              minWidth: 'min-content',
              paddingRight: '1rem'
            }}>
              {data.dailyData.map((day, idx) => (
                <div key={idx} style={{ 
                  display: 'flex', 
                  flexDirection: 'column', 
                  alignItems: 'center', 
                  flex: '0 0 auto',
                  minWidth: '28px'
                }}>
                  <div style={{ 
                    fontSize: '7px', 
                    color: '#1C3F75', 
                    fontWeight: 600, 
                    marginBottom: '2px',
                    height: '12px',
                    textAlign: 'center',
                    width: '100%'
                  }}>
                    {day.distance}
                  </div>
                  <div style={{ 
                    background: '#74ACDF', 
                    width: '16px', 
                    height: `${(day.distance / maxDistance) * 140}px`,
                    minHeight: '6px',
                    borderRadius: '2px'
                  }}></div>
                  <div style={{ 
                    fontSize: '7px', 
                    color: '#74ACDF', 
                    marginTop: '4px', 
                    fontWeight: 500,
                    textAlign: 'center',
                    width: '100%'
                  }}>
                    {day.date.split(' ')[1]}
                  </div>
                </div>
              ))}
            </div>
          </div>

          <div style={{ marginBottom: '2rem' }}>
            <h2 style={{ fontSize: '18px', fontWeight: 500, color: '#1C3F75', marginBottom: '1.5rem' }}>Badges earned</h2>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(120px, 1fr))', gap: '12px' }}>
              {data.badges.map(badge => (
                <div 
                  key={badge.id}
                  style={{
                    padding: '1rem',
                    borderRadius: '12px',
                    border: badge.unlocked ? '2px solid #CBA135' : '1px solid #E0E0E0',
                    background: badge.unlocked ? '#FFF8F0' : '#F5F5F5',
                    textAlign: 'center',
                    opacity: badge.unlocked ? 1 : 0.5
                  }}
                >
                  <div style={{ fontSize: '28px', marginBottom: '6px' }}>{badge.icon}</div>
                  <div style={{ fontSize: '12px', fontWeight: 500, color: '#1C3F75', marginBottom: '3px' }}>{badge.name}</div>
                  <div style={{ fontSize: '10px', color: '#555', lineHeight: 1.3 }}>{badge.description}</div>
                  {badge.unlocked && (
                    <div style={{ marginTop: '6px', fontSize: '11px', color: '#CBA135', fontWeight: 600 }}>✓ Unlocked</div>
                  )}
                </div>
              ))}
            </div>
            <div style={{ marginTop: '1.5rem', padding: '1rem', background: '#FFF8F0', borderRadius: '8px', textAlign: 'center', border: '1px solid #CBA135' }}>
              <div style={{ fontSize: '14px', color: '#1C3F75', fontWeight: 500 }}>{unlockedCount} of {data.badges.length} badges unlocked</div>
            </div>
          </div>

          <div style={{ padding: '1.5rem', background: '#F0F7FF', borderRadius: '12px', border: '1px solid #74ACDF' }}>
            <h3 style={{ fontSize: '16px', fontWeight: 500, color: '#1C3F75', marginBottom: '12px' }}>Walking insights</h3>
            <p style={{ fontSize: '14px', color: '#1C3F75', lineHeight: 1.6 }}>Great work on your walking routine! You've completed 17 walks totaling 12.4 miles since June 1st. Your longest streak was 5 consecutive days (Jun 7-11), and you've already unlocked 3 badges including the "Twice Daily" achievement on June 11. Keep building consistency to work toward your 14-day streak and 100-mile milestone!</p>
          </div>
        </div>
      );
    };

    ReactDOM.render(<WalkTracker />, document.getElementById('root'));
  </script>
</body>
</html>
