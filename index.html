<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude AI App</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 600px;
      width: 100%;
    }

    h1 {
      font-size: 32px;
      color: #333;
      margin-bottom: 20px;
      text-align: center;
    }

    .input-group {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
    }

    input {
      flex: 1;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 16px;
      transition: border-color 0.2s;
    }

    input:focus {
      outline: none;
      border-color: #667eea;
    }

    button {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 12px 30px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: transform 0.2s;
    }

    button:hover {
      transform: scale(1.05);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: scale(1);
    }

    .response-box {
      background: #f5f5f5;
      padding: 20px;
      border-radius: 8px;
      margin-top: 20px;
      min-height: 60px;
      display: none;
    }

    .response-box.show {
      display: block;
    }

    .response-box p {
      color: #333;
      line-height: 1.6;
      margin: 0;
    }

    .loading {
      color: #667eea;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Chat with Claude</h1>
    
    <div class="input-group">
      <input 
        type="text" 
        id="messageInput" 
        placeholder="Ask Claude anything..."
        autocomplete="off"
      >
      <button id="sendButton">Send</button>
    </div>

    <div id="responseBox" class="response-box">
      <p id="responseText"></p>
    </div>
  </div>

  <script>
    const messageInput = document.getElementById('messageInput');
    const sendButton = document.getElementById('sendButton');
    const responseBox = document.getElementById('responseBox');
    const responseText = document.getElementById('responseText');

    // Send message when clicking button
    sendButton.addEventListener('click', sendMessage);

    // Send message when pressing Enter
    messageInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        sendMessage();
      }
    });

    async function sendMessage() {
      const message = messageInput.value.trim();

      if (!message) {
        alert('Please type something!');
        return;
      }

      // Show loading state
      sendButton.disabled = true;
      responseBox.classList.add('show');
      responseText.textContent = 'Thinking...';
      responseText.classList.add('loading');

      try {
        // Send message to your serverless function
        const response = await fetch('/api/claude', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ message })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Something went wrong');
        }

        // Show Claude's response
        responseText.textContent = data.reply;
        responseText.classList.remove('loading');

        // Clear input
        messageInput.value = '';
        messageInput.focus();

      } catch (error) {
        responseText.textContent = `Error: ${error.message}`;
        responseText.classList.remove('loading');
      } finally {
        sendButton.disabled = false;
      }
    }
  </script>
</body>
</html>
